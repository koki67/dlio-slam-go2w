common:
  default_window: bag_record

parameters:
  source: ../install/setup.bash
  unitree_ros2: unitree_ros2/setup.sh

windows:
  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 run go2_demo imu_publisher
    name: imu_publisher

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch hesai_lidar hesai_lidar_launch.py
    name: hesai_lidar_node

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch direct_lidar_inertial_odometry dlio.launch.py
    name: dlio

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - sleep 5
      - "ros2 bag record -o /external/bags/slam_$(date +%Y%m%d_%H%M%S) /go2/imu /points_raw /hesai/pandar /dlio/odom_node/odom /dlio/odom_node/pose /dlio/odom_node/path /dlio/odom_node/keyframes /dlio/odom_node/pointcloud/keyframe /dlio/odom_node/pointcloud/deskewed /dlio/map_node/points /tf /tf_static"
    name: bag_record
